services:
  db:
    image: arangodb:latest
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=password_seguro

  app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - db
    environment:
      - ARANGO_URL=http://db:8529
      - ARANGO_PWD=password_seguro